appId: com.stellar.synapse
productName: Stellar Synapse
copyright: Copyright © 2026 Stellar Synapse

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - package.json
  - node_modules/**/*
  - '!node_modules/@types/**'
  - '!node_modules/**/{CHANGELOG.md,README.md,readme.md,readme,*.md}'
  - '!node_modules/**/{test,tests,__tests__,docs,example,examples}/**'

# Ship the tray icon outside the asar so the main process can load it at runtime
# via process.resourcesPath (asar-packed paths aren't real files on disk).
extraResources:
  - from: build/icon.png
    to: icon.png

asar: true
asarUnpack:
  - node_modules/serialport/**/*
  - node_modules/@serialport/**/*
  - node_modules/node-gyp-build/**/*
  - node_modules/mssql/**/*
  - node_modules/tedious/**/*

# serialport's native binding (@serialport/bindings-cpp) is N-API / prebuildify:
# it ships an ABI-stable prebuilt .node for win32-x64 that loads directly in
# Electron with NO recompilation. Disabling npmRebuild means the Windows build
# just PACKAGES that prebuilt — so producing the installer needs no Visual Studio
# / Python build toolchain, and the resulting .exe ships a working serialport
# with no end-user npm install or rebuild.
npmRebuild: false
buildDependenciesFromSource: false

win:
  icon: build/icon.png
  executableName: Stellar Synapse
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  include: build/installer.nsh
  # Per-user install only. Disabling elevation skips the install-mode selection
  # page, whose System.dll callbacks crash under this machine's security agent
  # (0xc0000005 in System.dll). Flow becomes Welcome -> Directory -> Install.
  allowElevation: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Stellar Synapse
  uninstallDisplayName: Stellar Synapse
  artifactName: Stellar-Synapse-Setup-${version}.${ext}
  deleteAppDataOnUninstall: false

publish: null
